apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-agent
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: workload-agent
    app: loan-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-agent
  template:
    metadata:
      labels:
        app: loan-agent
    spec:
      serviceAccountName: loan-agent
      containers:
        - name: agent
          image: loan-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.keycloak.svc.cluster.local:8080
            - name: KEYCLOAK_REALM
              value: agw-dev
            - name: CLIENT_ID
              value: loan-agent
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loan-agent-credentials
                  key: client_secret
            - name: AUDIENCE
              value: agentgateway
            - name: FD_AGENT_URL
              value: http://agentgateway.agentgateway-system.svc.cluster.local:8080/fd-agent/run
            - name: USE_TOKEN_EXCHANGE
              value: "false"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
